openapi: 3.0.0
info:
  title: Customer Order API
  description: A sample API for managing customers and orders
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://localhost:3000
    description: Local development server

paths:
  /customers:
    get:
      summary: Get all customers
      description: Retrieve a list of all customers
      operationId: getCustomers
      parameters:
        - name: limit
          in: query
          description: Maximum number of customers to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: status
          in: query
          description: Filter customers by status
          required: false
          schema:
            type: string
            enum: [active, inactive, pending]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'

    post:
      summary: Create a new customer
      description: Create a new customer record
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInput'
      responses:
        '201':
          description: Customer created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /customers/{id}:
    get:
      summary: Get customer by ID
      description: Retrieve a specific customer by their ID
      operationId: getCustomerById
      parameters:
        - name: id
          in: path
          required: true
          description: Customer ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /orders:
    get:
      summary: Get all orders
      description: Retrieve a list of all orders
      operationId: getOrders
      parameters:
        - name: customerId
          in: query
          description: Filter orders by customer ID
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter orders by status
          required: false
          schema:
            type: string
            enum: [pending, processing, shipped, delivered, cancelled]
        - name: limit
          in: query
          description: Maximum number of orders to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

    post:
      summary: Create a new order
      description: Create a new order record
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /orders/{id}:
    get:
      summary: Get order by ID
      description: Retrieve a specific order by its ID
      operationId: getOrderById
      parameters:
        - name: id
          in: path
          required: true
          description: Order ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Customer:
      type: object
      required:
        - id
        - firstName
        - lastName
        - email
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique customer identifier
          example: "123e4567-e89b-12d3-a456-426614174000"
        firstName:
          type: string
          minLength: 1
          maxLength: 50
          description: Customer's first name
          example: "John"
        lastName:
          type: string
          minLength: 1
          maxLength: 50
          description: Customer's last name
          example: "Doe"
        email:
          type: string
          format: email
          description: Customer's email address
          example: "john.doe@example.com"
        phone:
          type: string
          pattern: '^[+]?[1-9]\d{1,14}$'
          description: Customer's phone number
          example: "+1234567890"
        age:
          type: integer
          minimum: 18
          maximum: 80
          description: Customer's age
          example: 35
        status:
          type: string
          enum: [active, inactive, pending]
          description: Customer's current status
          example: "active"
        createdAt:
          type: string
          format: date-time
          description: When the customer was created
          example: "2023-01-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          description: When the customer was last updated
          example: "2023-01-15T10:30:00Z"

    CustomerInput:
      type: object
      required:
        - firstName
        - lastName
        - email
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 50
        lastName:
          type: string
          minLength: 1
          maxLength: 50
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: '^[+]?[1-9]\d{1,14}$'
        age:
          type: integer
          minimum: 18
          maximum: 80

    Order:
      type: object
      required:
        - id
        - customerId
        - totalAmount
        - currency
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique order identifier
          example: "987e6543-e21b-43d3-a456-426614174001"
        customerId:
          type: string
          format: uuid
          description: ID of the customer who placed the order
          example: "123e4567-e89b-12d3-a456-426614174000"
        totalAmount:
          type: number
          multipleOf: 0.01
          minimum: 0
          maximum: 10000
          description: Total order amount
          example: 299.99
        currency:
          type: string
          enum: [USD, EUR, GBP]
          description: Order currency
          example: "USD"
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
          description: Current order status
          example: "processing"
        items:
          type: array
          minItems: 1
          description: Items in the order
          items:
            $ref: '#/components/schemas/OrderItem'
        shippingAddress:
          $ref: '#/components/schemas/Address'
        createdAt:
          type: string
          format: date-time
          description: When the order was created
          example: "2023-01-15T14:30:00Z"
        updatedAt:
          type: string
          format: date-time
          description: When the order was last updated

    OrderInput:
      type: object
      required:
        - customerId
        - totalAmount
        - currency
        - items
      properties:
        customerId:
          type: string
          format: uuid
        totalAmount:
          type: number
          multipleOf: 0.01
          minimum: 0
          maximum: 10000
        currency:
          type: string
          enum: [USD, EUR, GBP]
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemInput'
        shippingAddress:
          $ref: '#/components/schemas/Address'

    OrderItem:
      type: object
      required:
        - id
        - productName
        - quantity
        - unitPrice
      properties:
        id:
          type: string
          format: uuid
        productName:
          type: string
          minLength: 1
          maxLength: 100
          example: "Wireless Headphones"
        quantity:
          type: integer
          minimum: 1
          maximum: 100
          example: 2
        unitPrice:
          type: number
          multipleOf: 0.01
          minimum: 0
          maximum: 1000
          example: 149.99

    OrderItemInput:
      type: object
      required:
        - productName
        - quantity
        - unitPrice
      properties:
        productName:
          type: string
          minLength: 1
          maxLength: 100
        quantity:
          type: integer
          minimum: 1
          maximum: 100
        unitPrice:
          type: number
          multipleOf: 0.01
          minimum: 0
          maximum: 1000

    Address:
      type: object
      required:
        - street
        - city
        - country
      properties:
        street:
          type: string
          minLength: 1
          maxLength: 100
          example: "123 Main St"
        city:
          type: string
          minLength: 1
          maxLength: 50
          example: "Springfield"
        state:
          type: string
          minLength: 2
          maxLength: 50
          example: "IL"
        postalCode:
          type: string
          pattern: '^[0-9]{5}(-[0-9]{4})?$'
          example: "62701"
        country:
          type: string
          minLength: 2
          maxLength: 2
          pattern: '^[A-Z]{2}$'
          example: "US"

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error type
        message:
          type: string
          description: Error message
        timestamp:
          type: string
          format: date-time