    background-repeat: repeat;
    background-size: 128px 128px;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* Subtle grid */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;

  #root { height: 100vh; position: relative; z-index: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* Stagger animation */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(61,214,140,0.4); }

  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

    opacity: 0;
    animation: fadeSlideIn 0.35s ease forwards;
  }

  .response-fade {
    animation: fadeIn 0.2s ease forwards;
  }

  .log-entry {
    animation: fadeIn 0.15s ease forwards;
  }

  .panel-slide {
    animation: slideUp 0.25s ease forwards;

    right: 16px;

  }

// ─── JSON Syntax Highlighter ─────────────────────────────────────────────────
function highlightJson(json) {
  if (!json) return '';
  return json.
  replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').
  replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
    let cls = 'json-num';
    if (/^"/.test(match)) {
      cls = /:$/.test(match) ? 'json-key' : 'json-str';
    } else if (/true|false/.test(match)) {
      cls = 'json-bool';
    } else if (/null/.test(match)) {
      cls = 'json-null';
    }
    return `<span class="${cls}">${match}</span>`;
  });
}

const VALIDATION_DATA = {
  score: 54,
  errors: [
  { path: '/customers/{id}', message: 'Missing required response schema for 404' },
  { path: '/orders', message: 'POST request body schema not defined' },
  { path: '/auth/login', message: 'Response 401 has no description' }],

  warnings: [],
  suggestions: [
  { path: '/customers', message: 'Add pagination parameters (page, limit)' },
  { path: '/products/{productId}', message: 'Consider adding a 404 response example' }],

  checks: { passed: 237, total: 438 }
};

function ValidationPanel({ open, onClose, accentColor }) {
  const [filter, setFilter] = useState('errors');
  if (!open) return null;
  const { score, errors, warnings, suggestions, checks } = VALIDATION_DATA;
  const scoreColor = score >= 80 ? 'var(--green)' : score >= 50 ? accentColor : 'var(--red)';
  const items = filter === 'errors' ? errors : filter === 'warnings' ? warnings : suggestions;
  return (
    <div className="panel-slide" style={{
      flexShrink: 0, borderBottom: '1px solid var(--border)',
      background: 'var(--surface2)'
    }}>
      <div style={{ padding: '10px 20px' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
          <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--text)', letterSpacing: '-0.01em' }}>Spec Validation</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text3)', fontSize: 11, fontFamily: 'var(--display)', display: 'flex', alignItems: 'center', gap: 4 }}>
            <Icons.ChevronUp size={11} strokeWidth={2} /> Hide
          </button>
        </div>
        <div style={{ display: 'flex', gap: 10, alignItems: 'stretch', marginBottom: 10 }}>
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 6, padding: '8px 12px', minWidth: 100 }}>
            <div style={{ fontSize: 10, color: 'var(--text3)', marginBottom: 3 }}>Quality Score</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: scoreColor, lineHeight: 1 }}>{score}<span style={{ fontSize: 12, fontWeight: 400 }}>%</span></div>
            <div style={{ marginTop: 5, width: '100%', height: 3, background: 'var(--surface3)', borderRadius: 2, overflow: 'hidden' }}>
              <div style={{ width: `${score}%`, height: '100%', background: scoreColor, transition: 'width 0.8s' }} />
            </div>
          </div>
          {[
          { label: 'Errors',     count: errors.length,      hex: '#E03E35', key: 'errors' },
          { label: 'Warnings',   count: warnings.length,    hex: '#D97706', key: 'warnings' },
          { label: 'Suggestions',count: suggestions.length, hex: '#2F7FD4', key: 'suggestions' },
          { label: 'Checks',     count: `${checks.passed}/${checks.total}`, hex: '#4A5068', key: null }].
          map(({ label, count, hex, key }) =>
          <div key={label}
            onClick={() => key && count && setFilter(key)}
            style={{
              flex: 1, textAlign: 'center',
              background: filter === key ? hex + '18' : 'var(--surface)',
              border: `1px solid ${filter === key ? hex + '66' : 'var(--border)'}`,
              borderRadius: 6, padding: '6px 4px',
              cursor: key && count ? 'pointer' : 'default',
              opacity: key && !count ? 0.35 : 1, transition: 'all 0.15s',
              userSelect: 'none',
            }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: hex, lineHeight: 1.2 }}>{count}</div>
              <div style={{ fontSize: 9, color: 'var(--text3)', letterSpacing: '0.06em', marginTop: 2 }}>{label.toUpperCase()}</div>
            </div>
          )}
        </div>
        {items.length > 0 &&
        <div style={{ borderTop: '1px solid var(--border)', paddingTop: 6, maxHeight: 80, overflow: 'auto' }}>
            {items.map((item, i) =>
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '3px 0', borderBottom: i < items.length - 1 ? '1px solid rgba(0,0,0,0.04)' : 'none' }}>
                {filter === 'errors' && <Icons.AlertCircle size={11} color="var(--red)" strokeWidth={2} />}
                {filter === 'warnings' && <Icons.AlertTriangle size={11} color="var(--amber)" strokeWidth={2} />}
                {filter === 'suggestions' && <Icons.Lightbulb size={11} color="var(--blue)" strokeWidth={2} />}
                <span style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'var(--text3)', minWidth: 160 }}>{item.path}</span>
                <span style={{ fontSize: 11, color: 'var(--text2)', flex: 1 }}>{item.message}</span>
              </div>
          )}
          </div>
        }
        {items.length === 0 && <div style={{ fontSize: 11, color: 'var(--text3)', paddingTop: 2 }}>No {filter} — looking good.</div>}
      </div>
    </div>);

}

// ─── Response Panel ────────────────────────────────────────────────────────────
function ResponsePanel({ response, endpoint, loading, onRegenerate, accentColor }) {
  const [copied, setCopied] = useState(false);
  const bodyStr = response?.body != null ? JSON.stringify(response.body, null, 2) : '';

  const copy = () => {
    if (!bodyStr) return;
    navigator.clipboard.writeText(bodyStr).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    });
  };

  if (!endpoint) {
    return (
      <div style={{
        flex: 1, display: 'flex', alignItems: 'flex-start', justifyContent: 'flex-start',
        padding: '20px 16px', gap: 10, color: 'var(--text3)'
      }}>
        <Icons.MousePointerClick size={13} strokeWidth={1.5} />
        <span style={{ fontSize: 12 }}>Select an endpoint to preview its response</span>
      </div>);

  }

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Response header */}
      <div style={{
        padding: '12px 16px',
        borderBottom: '1px solid var(--border)',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        flexShrink: 0
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <MethodBadge method={endpoint.method} />
          <span style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text)' }}>
            {endpoint.path}
          </span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          {response &&
          <>
              <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <Icons.Clock size={11} color="var(--text3)" strokeWidth={1.5} />
                <span style={{ fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--text3)' }}>
                  {response.ms}ms
                </span>
              </div>
              <div style={{
              padding: '2px 8px', borderRadius: 3, fontSize: 11, fontWeight: 600,
              fontFamily: 'var(--mono)',
              background: response.status < 300 ? 'rgba(61,214,140,0.1)' : 'rgba(240,88,77,0.1)',
              color: response.status < 300 ? 'var(--green)' : 'var(--red)',
              border: `1px solid ${response.status < 300 ? 'rgba(61,214,140,0.25)' : 'rgba(240,88,77,0.25)'}`
            }}>
                {response.status}
              </div>
              <button
              onClick={copy}
              style={{
                display: 'flex', alignItems: 'center', gap: 4,
                padding: '4px 8px', borderRadius: 4,
                border: '1px solid var(--border2)', background: 'transparent',
                color: copied ? 'var(--green)' : 'var(--text3)',
                fontSize: 11, cursor: 'pointer', transition: 'color 0.15s ease'
              }}>
              
                {copied ? <Icons.Check size={11} strokeWidth={2} /> : <Icons.Copy size={11} strokeWidth={1.5} />}
              </button>
              <button
              onClick={onRegenerate}
              style={{
                display: 'flex', alignItems: 'center', gap: 4,
                padding: '4px 8px', borderRadius: 4,
                border: '1px solid var(--border2)', background: 'transparent',
                color: 'var(--text3)', fontSize: 11, cursor: 'pointer'
              }}>
              
                <Icons.RefreshCw size={11} strokeWidth={1.5} />
              </button>
            </>
          }
        </div>
      </div>

      {/* JSON body */}
      <div style={{ flex: 1, overflow: 'auto', padding: '14px 16px' }}>
        {loading ?
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: 'var(--text3)', fontSize: 12 }}>
            <Icons.Loader size={14} strokeWidth={1.5} style={{ animation: 'spin 1s linear infinite' }} />
            Fetching response…
          </div> :
        response?.body != null ?
        <pre
          key={response.ts}
          className="response-fade"
          style={{
            fontFamily: 'var(--mono)', fontSize: 11.5, lineHeight: 1.65,
            color: 'var(--text2)', whiteSpace: 'pre-wrap', wordBreak: 'break-all'
          }}
          dangerouslySetInnerHTML={{ __html: highlightJson(bodyStr) }} /> :


        <span style={{ fontFamily: 'var(--mono)', fontSize: 12, color: 'var(--text3)' }}>
            204 No Content
          </span>
        }
      </div>
    </div>);

}

// ─── Log Strip ────────────────────────────────────────────────────────────────
function LogStrip({ logs, open, onToggle }) {
  const bottomRef = useRef(null);
  useEffect(() => {
    if (bottomRef.current && open) {
      bottomRef.current.scrollTop = bottomRef.current.scrollHeight;
    }
  }, [logs, open]);

  return (
    <div style={{
      borderTop: '1px solid var(--border)',
      background: 'var(--surface)',
      flexShrink: 0,
      transition: 'height 0.2s ease',
      height: open ? 130 : 32,
      display: 'flex', flexDirection: 'column'
    }}>
      {/* Toggle bar */}
      <button
        onClick={onToggle}
        style={{
          display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'space-between',
          padding: '0 16px', height: 32, background: 'transparent',
          border: 'none', borderBottom: open ? '1px solid var(--border)' : 'none',
          cursor: 'pointer', width: '100%', flexShrink: 0
        }}>
        
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{ width: 6, height: 6, borderRadius: '50%', background: logs.length > 0 ? 'var(--amber)' : 'var(--text3)', animation: logs.length ? 'pulse-amber 2s infinite' : 'none' }} />
          <span style={{ fontSize: 10, fontFamily: 'var(--mono)', color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>
            Server Logs
          </span>
          <span style={{ fontSize: 10, fontFamily: 'var(--mono)', color: 'var(--text3)' }}>
            {logs.length > 0 ? `${logs.length} request${logs.length !== 1 ? 's' : ''}` : 'idle'}
          </span>
        </div>
        {open ? <Icons.ChevronDown size={12} strokeWidth={2} color="var(--text3)" /> : <Icons.ChevronUp size={12} strokeWidth={2} color="var(--text3)" />}
      </button>

      {/* Log entries */}
      {open &&
      <div ref={bottomRef} style={{ flex: 1, overflow: 'auto', padding: '6px 16px' }}>
          {logs.length === 0 ?
        <div style={{ fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--text3)', paddingTop: 4 }}>
              Waiting for requests…
            </div> :
        logs.map((l, i) =>
        <div
          key={l.id}
          className="log-entry"
          style={{
            display: 'flex', alignItems: 'center', gap: 16,
            fontSize: 11, fontFamily: 'var(--mono)', color: 'var(--text3)',
            padding: '2px 0', borderBottom: i < logs.length - 1 ? '1px solid rgba(255,255,255,0.03)' : 'none'
          }}>
          
              <span style={{ color: 'var(--text3)', minWidth: 70 }}>{l.time}</span>
              <MethodBadge method={l.method} />
              <span style={{ color: 'var(--text2)', flex: 1 }}>{l.path}</span>
              <span style={{ color: l.status < 300 ? 'var(--green)' : 'var(--red)', minWidth: 30 }}>{l.status}</span>
              <span style={{ color: 'var(--text3)', minWidth: 48, textAlign: 'right' }}>{l.ms}ms</span>
            </div>
        )}
        </div>
      }
    </div>);

}

          <option value="comfortable">Comfortable</option>
          <option value="spacious">Spacious</option>
        </select>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">Mock Port</div>
        <input className="tweak-input" value={values.port} onChange={(e) => onChange('port', e.target.value)} />
      </div>
      <div className="tweak-row">
        <div className="tweak-label">Mono Font Size (px)</div>
        <input className="tweak-input" type="number" min="10" max="16" value={values.monoSize} onChange={(e) => onChange('monoSize', e.target.value)} />
      </div>
    </div>);

}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  const [serverRunning, setServerRunning] = useState(false);
  const [specLoaded, setSpecLoaded] = useState(false);
  const [endpoints, setEndpoints] = useState([]);
  const [selectedEp, setSelectedEp] = useState(null);
  const [response, setResponse] = useState(null);
  const [loadingResp, setLoadingResp] = useState(false);
  const [logs, setLogs] = useState([]);
  const [logOpen, setLogOpen] = useState(true);
  const [validOpen, setValidOpen] = useState(true);
  const [specKey, setSpecKey] = useState(0);

  // Tweaks wiring
  useEffect(() => {
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const handleTweak = (key, val) => {
    setTweaks((prev) => {
      const next = { ...prev, [key]: val };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
      return next;
    });
  };

  const accentColor = tweaks.accentColor;
  const port = tweaks.port;

  const densityPad = { compact: '6px 12px', comfortable: '9px 16px', spacious: '14px 20px' }[tweaks.density] || '9px 16px';

  const [specEditorOpen, setSpecEditorOpen] = useState(false);
  const [specContent, setSpecContent] = useState('');

  const DEMO_SPEC_CONTENT = `openapi: 3.0.0
info:
  title: Sample API
  version: 1.0.0
  description: A sample B2B SaaS API
paths:
  /customers:
    get:
      summary: List all customers
      tags: [Customers]
      responses:
        '200':
          description: OK
    post:
      summary: Create a customer
      tags: [Customers]
  /orders:
    get:
      summary: List all orders
      tags: [Orders]
    post:
      summary: Place an order
      tags: [Orders]
  /auth/login:
    post:
      summary: Authenticate user
      tags: [Auth]`;

  const loadDemo = () => {
    setSpecLoaded(true);
    setSpecContent(DEMO_SPEC_CONTENT);
    setEndpoints([]);
    setSelectedEp(null);
    setResponse(null);
    setSpecKey((k) => k + 1);
    setTimeout(() => setEndpoints(DEMO_ENDPOINTS), 50);
  };

  const clearSpec = () => {
    setSpecLoaded(false);
    setEndpoints([]);
    setSelectedEp(null);
    setResponse(null);
    setLogs([]);
  };

  const tryEndpoint = useCallback((ep) => {
    setSelectedEp(ep);
    setLoadingResp(true);
    setResponse(null);

    const ms = randBetween(12, 58);

    setTimeout(() => {
      const mock = MOCK_RESPONSES[ep.id];
      const r = { ...mock, ms, ts: Date.now() };
      setResponse(r);
      setLoadingResp(false);

      // Add to logs
      const now = new Date();
      const time = now.toTimeString().slice(0, 8);
      setLogs((prev) => [...prev.slice(-49), {
        id: Date.now(), time, method: ep.method, path: ep.path,
        status: mock.status, ms
      }]);
    }, ms + 80);
  }, []);

  // Group endpoints
  const groups = endpoints.reduce((acc, ep) => {
    if (!acc[ep.group]) acc[ep.group] = [];
    acc[ep.group].push(ep);
    return acc;
  }, {});

  // Base index for stagger across groups
  let baseIdx = 0;
  const groupEntries = Object.entries(groups).map(([name, eps]) => {
    const entry = { name, eps, baseIdx };
    baseIdx += eps.length;
    return entry;
  });

  // inject mono size
  useEffect(() => {
    document.documentElement.style.setProperty('--mono-size', tweaks.monoSize + 'px');
  }, [tweaks.monoSize]);

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <style>{`
        .json-key  { color: #2F7FD4; }
        .json-str  { color: #18A86B; }
        .json-num  { color: #D97706; }
        .json-bool { color: #E03E35; }
        .json-null { color: var(--text3); }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      `}</style>

      <Header
        serverRunning={serverRunning}
        port={port}
        onToggleServer={() => setServerRunning((r) => !r)}
        accentColor={accentColor} />
      

      <SpecPanel
        specLoaded={specLoaded}
        specName={DEMO_SPEC_NAME}
        specSize={DEMO_SPEC_SIZE}
        specValid={true}
        onLoadDemo={loadDemo}
        onClear={clearSpec}
        onEdit={() => setSpecEditorOpen(true)}
        accentColor={accentColor} />

      {/* Spec Editor Modal */}
      {specEditorOpen && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.3)', backdropFilter:'blur(4px)', zIndex:500, display:'flex', alignItems:'center', justifyContent:'center' }}
          onClick={() => setSpecEditorOpen(false)}>
          <div onClick={e => e.stopPropagation()} className="panel-slide"
            style={{ width:640, background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:12, boxShadow:'0 24px 64px rgba(0,0,0,0.18)', overflow:'hidden' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'16px 20px', borderBottom:'1px solid var(--border)' }}>
              <div>
                <div style={{ fontSize:14, fontWeight:600, color:'var(--text)' }}>Edit Spec — {DEMO_SPEC_NAME}</div>
                <div style={{ fontSize:11, color:'var(--text3)', marginTop:2 }}>Modify your OpenAPI spec and reload</div>
              </div>
              <button onClick={() => setSpecEditorOpen(false)} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text3)', padding:4 }}>
                <Icons.XCircle size={16} strokeWidth={1.5}/>
              </button>
            </div>
            <div style={{ padding:'16px 20px' }}>
              <textarea
                value={specContent}
                onChange={e => setSpecContent(e.target.value)}
                autoFocus
                style={{ width:'100%', height:320, fontFamily:'var(--mono)', fontSize:11.5, background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:6, padding:12, color:'var(--text)', resize:'none', outline:'none', lineHeight:1.6 }}
              />
            </div>
            <div style={{ display:'flex', justifyContent:'flex-end', gap:8, padding:'0 20px 16px' }}>
              <button onClick={() => setSpecEditorOpen(false)} style={{ padding:'8px 16px', borderRadius:'var(--radius)', border:'1px solid var(--border2)', background:'none', color:'var(--text2)', fontSize:12, cursor:'pointer', fontFamily:'var(--display)' }}>Cancel</button>
              <button onClick={() => { setSpecEditorOpen(false); setSpecKey(k => k+1); setTimeout(() => setEndpoints(DEMO_ENDPOINTS), 50); }}
                style={{ padding:'8px 20px', borderRadius:'var(--radius)', border:`1px solid ${accentColor}60`, background:accentColor, color:'#fff', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'var(--display)' }}>
                Reload Spec
              </button>
            </div>
          </div>
        </div>
      )}

      {specLoaded &&
      <ValidationPanel
        open={validOpen}
        onClose={() => setValidOpen(false)}
        accentColor={accentColor} />
      }
      {specLoaded && !validOpen &&
      <button
        onClick={() => setValidOpen(true)}
        style={{
          display: 'flex', alignItems: 'center', gap: 6,
          padding: '4px 16px', background: 'var(--surface2)',
          border: 'none', borderBottom: '1px solid var(--border)',
          cursor: 'pointer', fontSize: 10, color: 'var(--text3)',
          fontFamily: 'var(--mono)', letterSpacing: '0.04em', flexShrink: 0
        }}>
          <Icons.ChevronDown size={10} strokeWidth={2} />
          Show validation — {VALIDATION_DATA.errors.length} errors, {VALIDATION_DATA.suggestions.length} suggestions
        </button>
      }

      {/* Main content */}
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        {/* Endpoints list */}
        <div style={{
          width: specLoaded ? '50%' : '100%',
          borderRight: specLoaded ? '1px solid var(--border)' : 'none',
          overflow: 'auto',
          padding: specLoaded ? '12px 8px' : '0',
          transition: 'width 0.3s ease'
        }}>
          {!specLoaded && (
            <div style={{
              height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center',
              flexDirection: 'column', gap: 16, color: 'var(--text3)',
            }}>
              <div style={{
                width: 56, height: 56, borderRadius: 14,
                border: '1px solid var(--border2)', background: 'var(--surface)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <Icons.FileCode size={24} strokeWidth={1.2} color="var(--text3)" />
              </div>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--text2)', marginBottom: 4 }}>No spec loaded</div>
                <div style={{ fontSize: 11, color: 'var(--text3)' }}>Upload an OpenAPI spec to discover endpoints</div>
              </div>
            </div>
          )}

          {specLoaded && groupEntries.map(({ name, eps, baseIdx: bi }) =>
          <EndpointGroup
            key={name + specKey}
            name={name}
            endpoints={eps}
            selectedEp={selectedEp}
            onSelect={setSelectedEp}
            onTry={tryEndpoint}
            serverRunning={serverRunning}
            baseIdx={bi} />

          )}
        </div>

        {/* Response panel */}
        {specLoaded &&
        <div style={{
          flex: 1, display: 'flex', flexDirection: 'column',
          background: 'var(--surface)', overflow: 'hidden'
        }}>
            <ResponsePanel
            response={response}
            endpoint={selectedEp}
            loading={loadingResp}
            onRegenerate={() => selectedEp && tryEndpoint(selectedEp)}
            accentColor={accentColor} />
          
          </div>
        }
      </div>

      <LogStrip logs={logs} open={logOpen} onToggle={() => setLogOpen((o) => !o)} />

      <TweaksPanel open={tweaksOpen} values={tweaks} onChange={handleTweak} />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

  <rect x="8" y="26" width="30" height="2" rx="1" fill="#1C2030"/>
  <rect x="8" y="30" width="25" height="2" rx="1" fill="#1C2030"/>
  <rect x="8" y="34" width="28" height="2" rx="1" fill="#1C2030"/>
